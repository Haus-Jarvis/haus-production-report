.kpi-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }

  document.getElementById(&#x27;tech-tbl&#x27;).innerHTML=th;

  const tot_m=MONTHS.map((_,i)=&gt;D.depts.reduce((a,d)=&gt;a+D.dept_section2[d].m[i],0));
  ds.push({label:&#x27;전사 합계&#x27;,data:tot_m,type:&#x27;line&#x27;,borderColor:&#x27;#00C8B4&#x27;,backgroundColor:&#x27;transparent&#x27;,borderWidth:2.5,pointBackgroundColor:&#x27;#00C8B4&#x27;,pointRadius:4,tension:.4,yAxisID:&#x27;y2&#x27;});
  charts.trend=new Chart(document.getElementById(&#x27;trendChart&#x27;),{type:&#x27;bar&#x27;,data:{labels:MONTHS,datasets:ds},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:&#x27;index&#x27;,intersect:false},plugins:{legend:{position:&#x27;top&#x27;,align:&#x27;start&#x27;},tooltip:{callbacks:{label:c=&gt;`${c.dataset.label}: ${fmt(c.raw)}`}}},scales:{x:{stacked:true,grid:G},y:{stacked:true,grid:G,ticks:{callback:fmt}},y2:{position:&#x27;right&#x27;,grid:{drawOnChartArea:false},ticks:{callback:fmt}}}}});
  // Donut with %
  const dv=D.depts.map(d=&gt;D.dept_ytd[d]);
  charts.deptDonut=new Chart(document.getElementById(&#x27;deptDonut&#x27;),{type:&#x27;doughnut&#x27;,data:{labels:D.depts.map(d=&gt;D.dept_kr[d]),datasets:[{data:dv,backgroundColor:D.depts.map(d=&gt;DEPT_COLORS[d]),borderWidth:0,hoverOffset:6}]},options:{responsive:true,maintainAspectRatio:false,cutout:&#x27;68%&#x27;,plugins:{legend:{position:&#x27;right&#x27;,labels:{padding:10,font:{size:11},generateLabels:ch=&gt;{const data=ch.data.datasets[0].data;const sum=data.reduce((a,b)=&gt;a+b,0);return ch.data.labels.map((l,i)=&gt;({text:`${l}  ${(data[i]/sum*100).toFixed(1)}%`,fillStyle:ch.data.datasets[0].backgroundColor[i],strokeStyle:ch.data.datasets[0].backgroundColor[i],pointStyle:&#x27;circle&#x27;,index:i}))}}},tooltip:{callbacks:{label:c=&gt;`${c.label}: ${fmt(c.raw)} (${(c.raw/c.dataset.data.reduce((a,b)=&gt;a+b,0)*100).toFixed(1)}%)`}}}}});
  // Section 2 table
  let s2=&#x27;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;부서&lt;/th&gt;&lt;th class=&quot;r&quot;&gt;Jan&lt;/th&gt;&lt;th class=&quot;r&quot;&gt;Feb&lt;/th&gt;&lt;th class=&quot;r&quot;&gt;Mar&lt;/th&gt;&lt;th class=&quot;r&quot;&gt;Apr&lt;/th&gt;&lt;th class=&quot;r&quot;&gt;YTD&lt;/th&gt;&lt;th class=&quot;r&quot;&gt;Share%&lt;/th&gt;&lt;th class=&quot;r&quot;&gt;Avg/월&lt;/th&gt;&lt;th class=&quot;r&quot;&gt;Apr성장%&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;&#x27;;
  D.depts.forEach(d=&gt;{const s=D.dept_section2[d];const g=s.growth;s2+=`&lt;tr&gt;&lt;td&gt;&lt;span style=&quot;display:inline-flex;align-items:center;gap:6px&quot;&gt;&lt;span style=&quot;width:6px;height:6px;border-radius:50%;background:${DEPT_COLORS[d]}&quot;&gt;&lt;/span&gt;${D.dept_kr[d]}&lt;/span&gt;&lt;/td&gt;${s.m.map(v=&gt;`&lt;td class=&quot;r&quot;&gt;${fmt(v)}&lt;/td&gt;`).join(&#x27;&#x27;)}&lt;td class=&quot;r hl&quot;&gt;${fmt(s.ytd)}&lt;/td&gt;&lt;td class=&quot;r&quot;&gt;${s.share}%&lt;/td&gt;&lt;td class=&quot;r&quot;&gt;${fmt(s.avg)}&lt;/td&gt;&lt;td class=&quot;r&quot;&gt;&lt;span class=&quot;rate ${g&gt;=0?&#x27;up&#x27;:&#x27;down&#x27;}&quot;&gt;${g&gt;=0?&#x27;+&#x27;:&#x27;&#x27;}${g}%&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;`;});
  const tm=MONTHS.map((_,i)=&gt;D.depts.reduce((a,d)=&gt;a+D.dept_section2[d].m[i],0));
  s2+=`&lt;tr class=&quot;tot&quot;&gt;&lt;td&gt;전사 합계&lt;/td&gt;${tm.map(v=&gt;`&lt;td class=&quot;r&quot;&gt;${fmt(v)}&lt;/td&gt;`).join(&#x27;&#x27;)}&lt;td class=&quot;r&quot;&gt;${fmt(D.grand)}&lt;/td&gt;&lt;td class=&quot;r&quot;&gt;100%&lt;/td&gt;&lt;td class=&quot;r&quot;&gt;${fmt(D.grand/MONTHS.length)}&lt;/td&gt;&lt;td class=&quot;r&quot;&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;`;
  document.getElementById(&#x27;dept-section2-tbl&#x27;).innerHTML=s2;
}

// ============ MONTH FILTER ============
function buildMonthFilter(){const w=document.getElementById(&#x27;monthFilter&#x27;);[&#x27;전체&#x27;,...FMONTHS].forEach((m,i)=&gt;{const b=document.createElement(&#x27;button&#x27;);b.className=&#x27;mf-btn&#x27;+(i===0?&#x27; on&#x27;:&#x27;&#x27;);b.textContent=m;b.onclick=()=&gt;setMonth(i===0?&#x27;all&#x27;:i);w.appendChild(b);});}

// ============ TAB 1 RENDER ============
function curCatVals(){ // 현재 metric+month 기준 카테고리별 값 배열
  const src=metric===&#x27;case&#x27;?D.cat_case_m:D.cat_unit_m;
  if(month===&#x27;all&#x27;) return D.cats.map(c=&gt;src[c].reduce((a,b)=&gt;a+b,0));
  return D.cats.map(c=&gt;src[c][month-1]);
}
function curCatAvg(){const src=metric===&#x27;case&#x27;?D.cat_case_m:D.cat_unit_m;return D.cats.map(c=&gt;src[c].reduce((a,b)=&gt;a+b,0)/MONTHS.length);}

function renderProduct(){
  const mLbl=month===&#x27;all&#x27;?&#x27;전체&#x27;:FMONTHS[month-1];
  const metricLbl=metric===&#x27;case&#x27;?&#x27;주문건수(케이스)&#x27;:&#x27;유닛(생산량)&#x27;;
  if(subtab===0){ renderSummary(mLbl,metricLbl); }
  else{ renderDetail(mLbl,metricLbl); }
}

function renderSummary(mLbl,metricLbl){
  const src=metric===&#x27;case&#x27;?D.cat_case_m:D.cat_unit_m;
  // ── 카테고리 차트 ──
  document.getElementById(&#x27;catChartSub&#x27;).textContent=(month===&#x27;all&#x27;?&#x27;전체 · 누적 막대 (월별 / 카테고리)&#x27;:`${mLbl}월 · 카테고리별 막대`)+&#x27; · &#x27;+metricLbl;
  if(charts.catChart) charts.catChart.destroy();
  const ctx=document.getElementById(&#x27;catChart&#x27;);
  if(month===&#x27;all&#x27;){
    // 누적막대: x=월, 스택=카테고리
    charts.catChart=new Chart(ctx,{type:&#x27;bar&#x27;,data:{labels:FMONTHS,datasets:D.cats.map((c,i)=&gt;({label:D.cat_short[i],data:src[c],backgroundColor:CAT_COLORS[i]+&#x27;CC&#x27;,stack:&#x27;c&#x27;}))},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:&#x27;index&#x27;,intersect:false},plugins:{legend:{position:&#x27;top&#x27;,labels:{font:{size:10},padding:6}},tooltip:{callbacks:{label:c=&gt;`${c.dataset.label}: ${fmt(c.raw)}`}}},scales:{x:{stacked:true,grid:G},y:{stacked:true,grid:G,ticks:{callback:fmt}}}}});
  }else{
    // 막대: x=카테고리, 해당 월 값
    const vals=D.cats.map(c=&gt;src[c][month-1]);
    charts.catChart=new Chart(ctx,{type:&#x27;bar&#x27;,data:{labels:D.cat_short,datasets:[{label:mLbl+&#x27;월 &#x27;+metricLbl,data:vals,backgroundColor:D.cat_short.map((_,i)=&gt;CAT_COLORS[i]+&#x27;CC&#x27;),borderColor:CAT_COLORS,borderWidth:1,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=&gt;`${c.label}: ${fmt(c.raw)}`}}},scales:{x:{grid:G},y:{grid:G,ticks:{callback:fmt}}}}});
  }
  // ── 도넛 (월평균 or 선택월) ──
  const donutVals = month===&#x27;all&#x27; ? curCatAvg() : D.cats.map(c=&gt;src[c][month-1]);
  document.getElementById(&#x27;donutTitle&#x27;).textContent= month===&#x27;all&#x27;?&#x27;카테고리 월평균 비중&#x27;:`${mLbl}월 카테고리 비중`;
  document.getElementById(&#x27;donutSub&#x27;).textContent= (month===&#x27;all&#x27;?&#x27;월평균&#x27;:mLbl+&#x27;월&#x27;)+&#x27; · &#x27;+metricLbl;
  const donutTotal=donutVals.reduce((a,b)=&gt;a+b,0);
  document.getElementById(&#x27;dcVal&#x27;).textContent=fmt(donutTotal);
  document.getElementById(&#x27;dcLbl&#x27;).textContent=month===&#x27;all&#x27;?&#x27;월평균 합&#x27;:mLbl+&#x27;월 합&#x27;;
  if(charts.catDonut) charts.catDonut.destroy();
  charts.catDonut=new Chart(document.getElementById(&#x27;catDonut&#x27;),{type:&#x27;doughnut&#x27;,data:{labels:D.cat_short,datasets:[{data:donutVals,backgroundColor:CAT_COLORS,borderWidth:0,hoverOffset:6}]},options:{responsive:true,maintainAspectRatio:false,cutout:&#x27;65%&#x27;,plugins:{legend:{position:&#x27;right&#x27;,labels:{font:{size:9},padding:6,generateLabels:ch=&gt;{const dd=ch.data.datasets[0].data;return ch.data.labels.map((l,i)=&gt;({text:`${l}  ${fmt(dd[i])}`,fillStyle:CAT_COLORS[i],strokeStyle:CAT_COLORS[i],pointStyle:&#x27;circle&#x27;,index:i}))}}},tooltip:{callbacks:{label:c=&gt;`${c.label}: ${fmt(c.raw)} (${(c.raw/donutTotal*100).toFixed(1)}%)`}}}}});
  // ── 퍼널 ──
  renderFunnel(mLbl);
  // ── Top 15 ──
  renderTop(mLbl);
}

function renderFunnel(mLbl){
  const mk=month===&#x27;all&#x27;?&#x27;all&#x27;:String(month);
  const fd=D.funnel[mk][metric];
  document.getElementById(&#x27;funnelTitle&#x27;).textContent=(month===&#x27;all&#x27;?&#x27;YTD&#x27;:mLbl+&#x27;월&#x27;)+&#x27; 스테이지 퍼널&#x27;;
  document.getElementById(&#x27;funnelSub&#x27;).textContent=&#x27;주문 → 각 부서 처리율 · &#x27;+(metric===&#x27;case&#x27;?&#x27;케이스&#x27;:&#x27;유닛&#x27;);
  const wrap=document.getElementById(&#x27;funnelChart&#x27;);wrap.innerHTML=&#x27;&#x27;;
  const max=fd[D.stages[0]]||1;
  D.stages.forEach((s,i)=&gt;{const v=fd[s];const pct=Math.round(v/max*100);
    wrap.innerHTML+=`&lt;div class=&quot;funnel-row&quot;&gt;&lt;div class=&quot;funnel-label&quot;&gt;${s}&lt;/div&gt;&lt;div class=&quot;funnel-bar-wrap&quot;&gt;&lt;div class=&quot;funnel-bar&quot; style=&quot;width:${pct}%;background:${STAGE_COLORS[i]}&quot;&gt;&lt;span&gt;${fmt(v)}&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;funnel-pct&quot;&gt;${pct}%&lt;/div&gt;&lt;/div&gt;`;});
}

let topSortDir=-1;
function renderTop(mLbl){
  const mk=month===&#x27;all&#x27;?&#x27;all&#x27;:String(month);
  const rows=D.top[mk][metric];
  document.getElementById(&#x27;topTitle&#x27;).textContent=(month===&#x27;all&#x27;?&#x27;YTD&#x27;:mLbl+&#x27;월&#x27;)+&#x27; Top 15 제품 (&#x27;+(metric===&#x27;case&#x27;?&#x27;주문건수&#x27;:&#x27;유닛&#x27;)+&#x27;)&#x27;;
  const max=rows.length?rows[0][1]:1;
  let h=&#x27;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;#&lt;/th&gt;&lt;th&gt;제품명&lt;/th&gt;&lt;th class=&quot;r&quot;&gt;&#x27;+(metric===&#x27;case&#x27;?&#x27;케이스&#x27;:&#x27;유닛&#x27;)+&#x27;&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;&#x27;;
  rows.forEach((r,i)=&gt;{const pct=Math.round(r[1]/max*100);h+=`&lt;tr&gt;&lt;td class=&quot;rank&quot;&gt;${i+1}&lt;/td&gt;&lt;td style=&quot;font-size:11px&quot;&gt;${r[0]}&lt;span class=&quot;bar-inline&quot; style=&quot;width:${pct}%;background:linear-gradient(90deg,#00C8B4,#F5A623)&quot;&gt;&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;r hl&quot;&gt;${fmt(r[1])}&lt;/td&gt;&lt;/tr&gt;`;});
  document.getElementById(&#x27;topTbl&#x27;).innerHTML=h+&#x27;&lt;/tbody&gt;&#x27;;
}

// ============ 월별 상세 지표 ============
function renderDetail(mLbl,metricLbl){
  if(month===&#x27;all&#x27;){ renderSimpleMonths(metricLbl); renderDetailMonths(metricLbl); }
  else{ renderSimpleStages(mLbl,metricLbl); renderDetailStages(mLbl,metricLbl); }
}
// 종합(월별 컬럼)
function renderSimpleMonths(metricLbl){
  const src=metric===&#x27;case&#x27;?D.cat_case_m:D.cat_unit_m;
  document.getElementById(&#x27;simpleTitle&#x27;).textContent=&#x27;[간단보기] 대카테고리 × 월별&#x27;;
  document.getElementById(&#x27;simpleSub&#x27;).textContent=metricLbl+&#x27; · YTD + 월평균&#x27;;
  let h=&#x27;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;대카테고리&lt;/th&gt;&#x27;+FMONTHS.map(m=&gt;`&lt;th class=&quot;r&quot;&gt;${m}&lt;/th&gt;`).join(&#x27;&#x27;)+&#x27;&lt;th class=&quot;r&quot;&gt;YTD&lt;/th&gt;&lt;th class=&quot;r&quot;&gt;월평균&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;&#x27;;
  let tot=FMONTHS.map(()=&gt;0);
  D.cats.forEach((c,i)=&gt;{const m=src[c];const ytd=m.reduce((a,b)=&gt;a+b,0);m.forEach((v,j)=&gt;tot[j]+=v);
    h+=`&lt;tr&gt;&lt;td class=&quot;grp-cell&quot;&gt;${c}&lt;/td&gt;${m.map(v=&gt;`&lt;td class=&quot;r&quot;&gt;${fmt(v)}&lt;/td&gt;`).join(&#x27;&#x27;)}&lt;td class=&quot;r hl&quot;&gt;${fmt(ytd)}&lt;/td&gt;&lt;td class=&quot;r&quot;&gt;${(ytd/MONTHS.length).toFixed(1)}&lt;/td&gt;&lt;/tr&gt;`;});
  const gy=tot.reduce((a,b)=&gt;a+b,0);
  h+=`&lt;tr class=&quot;tot&quot;&gt;&lt;td&gt;합계&lt;/td&gt;${tot.map(v=&gt;`&lt;td class=&quot;r&quot;&gt;${fmt(v)}&lt;/td&gt;`).join(&#x27;&#x27;)}&lt;td class=&quot;r&quot;&gt;${fmt(gy)}&lt;/td&gt;&lt;td class=&quot;r&quot;&gt;${(gy/MONTHS.length).toFixed(1)}&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;`;
  document.getElementById(&#x27;simpleTbl&#x27;).innerHTML=h;
}
function renderDetailMonths(metricLbl){
  document.getElementById(&#x27;detailTitle&#x27;).textContent=&#x27;[상세보기] 대카테고리-제품별 × 월별&#x27;;
  document.getElementById(&#x27;detailSub&#x27;).textContent=metricLbl+&#x27; · 제품별 월별 + YTD + 월평균&#x27;;
  let h=&#x27;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;대카테고리&lt;/th&gt;&lt;th&gt;제품명&lt;/th&gt;&#x27;+FMONTHS.map(m=&gt;`&lt;th class=&quot;r&quot;&gt;${m}&lt;/th&gt;`).join(&#x27;&#x27;)+&#x27;&lt;th class=&quot;r&quot;&gt;YTD&lt;/th&gt;&lt;th class=&quot;r&quot;&gt;월평균&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;&#x27;;
  D.cats.forEach(c=&gt;{const rows=D.cat_prod[c];rows.forEach((row,ri)=&gt;{const vals=row[metric];const ytd=vals.reduce((a,b)=&gt;a+b,0);if(ytd===0)return;
    h+=`&lt;tr&gt;&lt;td class=&quot;grp-cell&quot;&gt;${ri===0?c:&#x27;&#x27;}&lt;/td&gt;&lt;td style=&quot;font-size:11px&quot;&gt;${row.prod}&lt;/td&gt;${vals.map(v=&gt;`&lt;td class=&quot;r&quot;&gt;${v?fmt(v):&#x27;—&#x27;}&lt;/td&gt;`).join(&#x27;&#x27;)}&lt;td class=&quot;r hl&quot;&gt;${fmt(ytd)}&lt;/td&gt;&lt;td class=&quot;r&quot;&gt;${(ytd/MONTHS.length).toFixed(1)}&lt;/td&gt;&lt;/tr&gt;`;});});
  document.getElementById(&#x27;detailTbl&#x27;).innerHTML=h+&#x27;&lt;/tbody&gt;&#x27;;
}
// 특정월(스테이지 컬럼)
function renderSimpleStages(mLbl,metricLbl){
  const key=`${month}_${metric}`;const sd=D.month_stage_simple[key];
  document.getElementById(&#x27;simpleTitle&#x27;).textContent=`[간단보기] 대카테고리 × 스테이지 (${mLbl}월)`;
  document.getElementById(&#x27;simpleSub&#x27;).textContent=metricLbl+&#x27; · 주문전체→스캔→디자인→밀링→3D→피니싱→메탈피니싱&#x27;;
  let h=&#x27;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;대카테고리&lt;/th&gt;&#x27;+D.stages.map(s=&gt;`&lt;th class=&quot;r&quot;&gt;${s}&lt;/th&gt;`).join(&#x27;&#x27;)+&#x27;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;&#x27;;
  let tot={};D.stages.forEach(s=&gt;tot[s]=0);
  D.cats.forEach(c=&gt;{const row=sd[c];D.stages.forEach(s=&gt;tot[s]+=row[s]);
    h+=`&lt;tr&gt;&lt;td class=&quot;grp-cell&quot;&gt;${c}&lt;/td&gt;${D.stages.map((s,i)=&gt;`&lt;td class=&quot;r&quot; ${i===0?&#x27;style=&quot;background:rgba(245,166,35,.08)&quot;&#x27;:&#x27;&#x27;}&gt;${row[s]?fmt(row[s]):&#x27;—&#x27;}&lt;/td&gt;`).join(&#x27;&#x27;)}&lt;/tr&gt;`;});
  h+=`&lt;tr class=&quot;tot&quot;&gt;&lt;td&gt;합계&lt;/td&gt;${D.stages.map(s=&gt;`&lt;td class=&quot;r&quot;&gt;${fmt(tot[s])}&lt;/td&gt;`).join(&#x27;&#x27;)}&lt;/tr&gt;&lt;/tbody&gt;`;
  document.getElementById(&#x27;simpleTbl&#x27;).innerHTML=h;
}
function renderDetailStages(mLbl,metricLbl){

.g3 { display:grid; grid-template-columns:2fr 1fr; gap:14px; }
.g4 { display:grid; grid-template-columns:3fr 2fr; gap:14px; }
.mt16 { margin-top:16px; }

/* TECH LEGEND */
.tleg { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; }
.tleg-item { display:flex; align-items:center; gap:4px; font-size:11px; color:var(--t2); }
.tleg-dot { width:7px; height:7px; border-radius:50%; }

/* TOGGLE */
.tog-grp { display:inline-flex; background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:3px; gap:2px; margin-bottom:12px; }
.tog { padding:6px 14px; border:none; border-radius:4px; cursor:pointer; font-family:&#x27;Inter&#x27;; font-size:11px; font-weight:600; color:var(--t2); background:none; transition:all .15s; }
.tog:hover { color:var(--t1); }
.tog.on { background:var(--primary-md); color:#fff; box-shadow:0 1px 3px rgba(59,130,246,.3); }

/* TABLE */
.tbl { width:100%; border-collapse:collapse; font-size:12px; }
.tbl thead { position:sticky; top:0; z-index:1; }
.tbl th { text-align:left; padding:9px 11px; font-size:10px; font-weight:700; color:var(--t2); letter-spacing:.06em; text-transform:uppercase; border-bottom:2px solid var(--border2); background:var(--bg); white-space:nowrap; }
.tbl td { padding:8px 11px; border-bottom:1px solid var(--border); }
.tbl tbody tr:hover td { background:var(--primary-lt); }
.tbl .r { text-align:right; font-family:&#x27;JetBrains Mono&#x27;; }
.tbl .hl { font-weight:700; color:var(--primary-md); }
.tbl .tot td { background:var(--primary-lt); font-weight:700; }
.rate { display:inline-flex; padding:2px 7px; border-radius:12px; font-size:10px; font-weight:700; font-family:&#x27;JetBrains Mono&#x27;; }
.rate.hi { background:#FEE2E2; color:#DC2626; }
.rate.mid { background:#FEF3C7; color:#D97706; }
.rate.lo { background:#DCFCE7; color:#16A34A; }
.bar-bg { flex:1; height:4px; background:var(--border); border-radius:2px; min-width:40px; }
.bar-fill { height:100%; border-radius:2px; transition:width .6s ease; }
.bar-cell { display:flex; align-items:center; gap:6px; }

/* FUNNEL */
.funnel-row { display:flex; align-items:center; gap:10px; padding:7px 0; border-bottom:1px solid var(--border); }
.funnel-label { font-size:12px; width:78px; color:var(--t2); font-weight:500; }
.funnel-bar-wrap { flex:1; background:var(--border); border-radius:5px; height:22px; overflow:hidden; }
.funnel-bar { height:100%; border-radius:5px; display:flex; align-items:center; padding-left:8px; transition:width .7s cubic-bezier(.4,0,.2,1); font-size:11px; font-weight:700; font-family:&#x27;JetBrains Mono&#x27;; color:#fff; }
.funnel-pct { font-family:&#x27;JetBrains Mono&#x27;; font-size:11px; color:var(--t2); width:36px; text-align:right; }

::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }
@media(max-width:900px) { .g2,.g3,.g4{grid-template-columns:1fr} .kpi-row{flex-wrap:wrap} }

.lang-sel{display:flex;align-items:center;gap:3px;margin-left:10px}
.lang-btn{padding:4px 9px;border:1px solid var(--border);border-radius:5px;background:none;cursor:pointer;font-size:11px;font-weight:700;color:var(--t2);transition:all .15s;font-family:&#x27;Inter&#x27;;}
.lang-btn:hover{border-color:var(--primary-md);color:var(--primary)}
.lang-btn.lact{background:var(--primary-md);border-color:var(--primary-md);color:#fff}
.lang-sep{font-size:10px;color:var(--t3)}
.ver-badge{font-size:10px;font-family:&#x27;JetBrains Mono&#x27;;color:var(--t3);padding:2px 7px;border:1px solid var(--border);border-radius:4px}

/* ===== HAUS unified theme polish (v1.14) ===== */
body{ -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility; }
.tbl{ font-variant-numeric:tabular-nums lining-nums; }
.tbl th{ font-weight:600;letter-spacing:.015em; }
.tbl td.r,.tbl th.r{ font-variant-numeric:tabular-nums; }
.kpi-v{ font-variant-numeric:tabular-nums;letter-spacing:-.015em; }
.card-title{ letter-spacing:-.01em; }
.card{ border-radius:12px; }
.stab-badge,.hub-badge{ font-variant-numeric:tabular-nums; }

function buildWorkerSheet(id, data, tasks, lineId, donutId, tblId, legId){
  const techs=Object.keys(data);
  const techColors=D.techColors;
  // Legend
  const leg=document.getElementById(legId);
  techs.forEach((t,i)=&gt;{
    const el=document.createElement(&#x27;div&#x27;);
    el.className=&#x27;tleg-item&#x27;;
    el.innerHTML=`&lt;div class=&quot;tleg-dot&quot; style=&quot;background:${techColors[D.techs.indexOf(t)||i]}&quot;&gt;&lt;/div&gt;${t}`;
    leg.appendChild(el);
  });
  // Line chart
  const lineDS=techs.map((t,i)=&gt;({
    label:t,data:data[t].monthly,
    borderColor:techColors[D.techs.indexOf(t)],backgroundColor:techColors[D.techs.indexOf(t)]+&#x27;22&#x27;,
    borderWidth:2,pointRadius:4,pointHoverRadius:6,tension:0.4,fill:false
  }));
  charts[lineId]=new Chart(document.getElementById(lineId),{
    type:&#x27;line&#x27;,data:{labels:D.months,datasets:lineDS},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:&#x27;index&#x27;,intersect:false},
      plugins:{legend:{position:&#x27;top&#x27;}},scales:{x:{grid:G},y:{grid:G,ticks:{callback:v=&gt;v.toLocaleString()}}}}
  });
  // Donut (월평균)
  const donutData=techs.map(t=&gt;Math.round(data[t].ytd/5));
  const donutTotal=Math.max(donutData.reduce((a,b)=&gt;a+b,0),1);
  charts[donutId]=new Chart(document.getElementById(donutId),{
    type:&#x27;doughnut&#x27;,
    data:{labels:techs,datasets:[{data:donutData,backgroundColor:techs.map((t,i)=&gt;techColors[D.techs.indexOf(t)]),borderWidth:0,hoverOffset:6}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:&#x27;65%&#x27;,
      interaction:{mode:&#x27;nearest&#x27;,intersect:true},
      plugins:{
        legend:{position:&#x27;right&#x27;,labels:{usePointStyle:true,pointStyleWidth:8,color:&#x27;#334155&#x27;,font:{size:11},
          generateLabels:ch=&gt;{const dd=ch.data.datasets[0].data;return ch.data.labels.map((l,i)=&gt;({
            text:`${l}  ${dd[i].toLocaleString()}  (${(dd[i]/donutTotal*100).toFixed(1)}%)`,
            fillStyle:ch.data.datasets[0].backgroundColor[i],strokeStyle:&#x27;transparent&#x27;,pointStyle:&#x27;circle&#x27;,index:i}));}
        }},
        tooltip:{callbacks:{
          label:function(ctx){return ctx.label+&#x27;: &#x27;+ctx.raw.toLocaleString()+&#x27; (&#x27;+(ctx.raw/donutTotal*100).toFixed(1)+&#x27;%)&#x27;;}
        }}
      }
    }
  });
  // Table builder
  buildWorkerTable(tblId, data, tasks, &#x27;ytd&#x27;);
  return {line:charts[lineId],donut:charts[donutId]};
}

function buildWorkerTable(tblId, data, tasks, view){
  const tbl=document.getElementById(tblId);
  const techs=Object.keys(data);
  const mi=[&#x27;jan&#x27;,&#x27;feb&#x27;,&#x27;mar&#x27;,&#x27;apr&#x27;,&#x27;may&#x27;].indexOf(view); // -1 if ytd
  // 각 테크니션의 현재 view 기준 작업별 값
  function techVals(t){
    const d=data[t];
    if(view===&#x27;ytd&#x27;) return tasks.map(task=&gt;d.tasks[task]||0);
    return tasks.map(task=&gt;(d.tm&amp;&amp;d.tm[task])?d.tm[task][mi]||0:0);
  }
  // 비중 스케일: 현재 view 기준 행합 최대값
  const rowSums=techs.map(t=&gt;techVals(t).reduce((a,b)=&gt;a+b,0));
  const maxRow=Math.max(...rowSums,1);
  const preTotal=Math.max(rowSums.reduce((a,b)=&gt;a+b,0),1);
  let html=`&lt;thead&gt;&lt;tr&gt;&lt;th&gt;Technician&lt;/th&gt;`;
  tasks.forEach(t=&gt;html+=`&lt;th class=&quot;r&quot;&gt;${t.replace(&#x27;Ti/Croco &#x27;,&#x27;&#x27;).replace(&#x27;I-Bar - &#x27;,&#x27;&#x27;)}&lt;/th&gt;`);
  html+=`&lt;th class=&quot;r&quot;&gt;합계&lt;/th&gt;&lt;th style=&quot;min-width:80px&quot;&gt;비중&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;`;
  let totals=tasks.map(()=&gt;0); let grandTotal=0;
  techs.forEach((t,i)=&gt;{
    const tc=D.techColors[D.techs.indexOf(t)];
    const vals=techVals(t);
    const rowSum=vals.reduce((a,b)=&gt;a+b,0);
    const pct=Math.round(rowSum/maxRow*100);
    vals.forEach((v,j)=&gt;totals[j]+=v); grandTotal+=rowSum;
    html+=`&lt;tr&gt;&lt;td&gt;&lt;span style=&quot;display:inline-flex;align-items:center;gap:6px&quot;&gt;&lt;span style=&quot;width:6px;height:6px;border-radius:50%;background:${tc};display:inline-block&quot;&gt;&lt;/span&gt;${t}&lt;/span&gt;&lt;/td&gt;`;
    vals.forEach(v=&gt;html+=`&lt;td class=&quot;r&quot;&gt;${v?v.toLocaleString():&#x27;—&#x27;}&lt;/td&gt;`);
    html+=`&lt;td class=&quot;r hl&quot;&gt;${rowSum.toLocaleString()}&lt;/td&gt;
      &lt;td style=&quot;min-width:110px&quot;&gt;&lt;div style=&quot;display:flex;align-items:center;gap:5px&quot;&gt;&lt;div class=&quot;bar-bg&quot; style=&quot;flex:1&quot;&gt;&lt;div class=&quot;bar-fill&quot; style=&quot;width:${pct}%;background:${tc}&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;span style=&quot;font-size:10px;font-family:&#x27;JetBrains Mono&#x27;;color:${tc};min-width:36px;text-align:right;font-weight:600&quot;&gt;${(rowSum/preTotal*100).toFixed(1)}%&lt;/span&gt;&lt;/div&gt;&lt;/td&gt;&lt;/tr&gt;`;
  });
  html+=`&lt;/tbody&gt;&lt;tfoot class=&quot;tot&quot;&gt;&lt;tr&gt;&lt;td style=&quot;color:#475569&quot;&gt;합계 ${view===&#x27;ytd&#x27;?&#x27;(YTD)&#x27;:&#x27;(&#x27;+view.toUpperCase()+&#x27;)&#x27;}&lt;/td&gt;`;
  totals.forEach(v=&gt;html+=`&lt;td class=&quot;r&quot;&gt;${v.toLocaleString()}&lt;/td&gt;`);
  html+=`&lt;td class=&quot;r&quot; style=&quot;color:#1E40AF&quot;&gt;${grandTotal.toLocaleString()}&lt;/td&gt;&lt;td&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/tfoot&gt;`;
  tbl.innerHTML=html;
}

function togView(mId, dataObj, tasks, tblId, view, btn){
  btn.closest(&#x27;.tog-grp&#x27;).querySelectorAll(&#x27;.tog&#x27;).forEach(b=&gt;b.classList.remove(&#x27;on&#x27;));
  btn.classList.add(&#x27;on&#x27;);
  buildWorkerTable(tblId, dataObj, tasks, view);
}
function m1view(v,b){togView(&#x27;m1&#x27;,D.m1.data,D.m1.tasks,&#x27;m1-tbl&#x27;,v,b)}

    html+=`&lt;tr&gt;&lt;td&gt;&lt;span style=&quot;color:${optC[i]};font-weight:600&quot;&gt;${o}&lt;/span&gt;&lt;/td&gt;${D.m4.data[o].map(v=&gt;`&lt;td class=&quot;r&quot;&gt;${v}&lt;/td&gt;`).join(&#x27;&#x27;)}&lt;td class=&quot;r hl&quot;&gt;${ytd}&lt;/td&gt;&lt;/tr&gt;`;

}

// ══════════════════════════════════
//  M5
// ══════════════════════════════════
function initM5(){
  const top5=D.m5.reasons.slice(0,5);
  const rColors=[&#x27;#EF5350&#x27;,&#x27;#FF7043&#x27;,&#x27;#FFA726&#x27;,&#x27;#FFEE58&#x27;,&#x27;#66BB6A&#x27;];
  charts.m5line=new Chart(document.getElementById(&#x27;m5-line&#x27;),{
    type:&#x27;line&#x27;,
    data:{labels:D.months,datasets:top5.map((r,i)=&gt;({
      label:r,data:D.m5.reason_data[r],borderColor:rColors[i],
      backgroundColor:rColors[i]+&#x27;22&#x27;,borderWidth:2,pointRadius:3,tension:0.3,fill:false
    }))},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:&#x27;index&#x27;,intersect:false},
      plugins:{legend:{position:&#x27;top&#x27;,labels:{font:{size:10}}}},scales:{x:{grid:G},y:{grid:G}}}
  });
  const ytds=D.m5.reasons.map(r=&gt;D.m5.reason_data[r].reduce((a,b)=&gt;a+b,0));
  charts.m5donut=new Chart(document.getElementById(&#x27;m5-donut&#x27;),{
    type:&#x27;doughnut&#x27;,
    data:{labels:D.m5.reasons,datasets:[{data:ytds.map(v=&gt;Math.round(v/4)),backgroundColor:D.m5.reasons.map((_,i)=&gt;rColors[i%5]+&#x27;CC&#x27;),borderWidth:0,hoverOffset:4}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:&#x27;60%&#x27;,plugins:{legend:{position:&#x27;right&#x27;,labels:{font:{size:9},padding:8}}}}
  });
  // 사유별 표
  let html=`&lt;thead&gt;&lt;tr&gt;&lt;th&gt;사유&lt;/th&gt;&lt;th class=&quot;r&quot;&gt;Jan&lt;/th&gt;&lt;th class=&quot;r&quot;&gt;Feb&lt;/th&gt;&lt;th class=&quot;r&quot;&gt;Mar&lt;/th&gt;&lt;th class=&quot;r&quot;&gt;Apr&lt;/th&gt;&lt;th class=&quot;r&quot;&gt;May&lt;/th&gt;&lt;th class=&quot;r&quot;&gt;YTD&lt;/th&gt;&lt;th class=&quot;r&quot;&gt;비중&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;`;
  D.m5.reasons.forEach((r,i)=&gt;{
    const d=D.m5.reason_data[r]; const ytd=d.reduce((a,b)=&gt;a+b,0);
    const pct=((ytd/D.m5.total)*100).toFixed(1);
    const rateClass=ytd&gt;100?&#x27;hi&#x27;:ytd&gt;30?&#x27;mid&#x27;:&#x27;lo&#x27;;
    html+=`&lt;tr&gt;&lt;td style=&quot;font-size:11px&quot;&gt;${r}&lt;/td&gt;${d.map(v=&gt;`&lt;td class=&quot;r&quot;&gt;${v||&#x27;—&#x27;}&lt;/td&gt;`).join(&#x27;&#x27;)}&lt;td class=&quot;r hl&quot;&gt;${ytd}&lt;/td&gt;&lt;td class=&quot;r&quot;&gt;&lt;span class=&quot;rate ${rateClass}&quot;&gt;${pct}%&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;`;
  });
  const totM=D.months.map((_,i)=&gt;D.m5.reasons.reduce((a,r)=&gt;a+D.m5.reason_data[r][i],0));
  html+=`&lt;tr class=&quot;tot&quot;&gt;&lt;td&gt;합계&lt;/td&gt;${totM.map(v=&gt;`&lt;td class=&quot;r&quot;&gt;${v}&lt;/td&gt;`).join(&#x27;&#x27;)}&lt;td class=&quot;r&quot; style=&quot;color:#DC2626&quot;&gt;${D.m5.total}&lt;/td&gt;&lt;td&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;`;
  document.getElementById(&#x27;m5-reason-tbl&#x27;).innerHTML=html;
  // 테크니션별 표
  let html2=`&lt;thead&gt;&lt;tr&gt;&lt;th&gt;테크니션&lt;/th&gt;&lt;th class=&quot;r&quot;&gt;총작업&lt;/th&gt;&lt;th class=&quot;r&quot;&gt;Redo&lt;/th&gt;&lt;th class=&quot;r&quot;&gt;비율&lt;/th&gt;&lt;th class=&quot;r&quot;&gt;Jan&lt;/th&gt;&lt;th class=&quot;r&quot;&gt;Feb&lt;/th&gt;&lt;th class=&quot;r&quot;&gt;Mar&lt;/th&gt;&lt;th class=&quot;r&quot;&gt;Apr&lt;/th&gt;&lt;th class=&quot;r&quot;&gt;May&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;`;
  Object.entries(D.m5.tech_data).forEach(([t,d],i)=&gt;{
    const rate=((d.redo/d.work)*100).toFixed(1);
    const cl=d.redo&gt;200?&#x27;hi&#x27;:d.redo&gt;50?&#x27;mid&#x27;:&#x27;lo&#x27;;
    html2+=`&lt;tr&gt;&lt;td&gt;${t}&lt;/td&gt;&lt;td class=&quot;r&quot;&gt;${d.work.toLocaleString()}&lt;/td&gt;&lt;td class=&quot;r hl&quot;&gt;${d.redo}&lt;/td&gt;&lt;td class=&quot;r&quot;&gt;&lt;span class=&quot;rate ${cl}&quot;&gt;${rate}%&lt;/span&gt;&lt;/td&gt;${d.monthly.map(v=&gt;`&lt;td class=&quot;r&quot;&gt;${v||&#x27;—&#x27;}&lt;/td&gt;`).join(&#x27;&#x27;)}&lt;/tr&gt;`;
  });
  html2+=&#x27;&lt;/tbody&gt;&#x27;;
  document.getElementById(&#x27;m5-tech-tbl&#x27;).innerHTML=html2;
}

// ══════════════════════════════════
//  M6
// ══════════════════════════════════
function initM6(){
  const techs=Object.keys(D.m6);
  // KPIs (YTD per tech)
  const kpiRow=document.getElementById(&#x27;m6-kpi-row&#x27;);
  techs.forEach((t,i)=&gt;{
    const mths=Object.values(D.m6[t]);
    const ytdU=mths.reduce((a,m)=&gt;a+m.unit,0);
    const ytdH=mths.reduce((a,m)=&gt;a+m.total,0);
    const rate=(ytdU/ytdH).toFixed(1);
    const tc=D.techColors[D.techs.indexOf(t)];
    kpiRow.innerHTML+=`&lt;div class=&quot;kpi&quot; style=&quot;--accent:${tc}&quot;&gt;&lt;div class=&quot;kpi-lbl&quot;&gt;${t}&lt;/div&gt;&lt;div class=&quot;kpi-val&quot; style=&quot;font-size:18px;color:${tc}&quot;&gt;${Math.round(ytdU/4).toLocaleString()}&lt;/div&gt;&lt;div class=&quot;kpi-sub&quot;&gt;월평균 unit &amp;nbsp;|&amp;nbsp; ${rate} unit/hr&lt;/div&gt;&lt;/div&gt;`;
  });
  // Unit line
  charts.m6unit=new Chart(document.getElementById(&#x27;m6-unit&#x27;),{
    type:&#x27;line&#x27;,
    data:{labels:D.months,datasets:techs.map((t,i)=&gt;({
      label:t,data:Object.values(D.m6[t]).map(m=&gt;m.unit),
      borderColor:D.techColors[D.techs.indexOf(t)],backgroundColor:D.techColors[D.techs.indexOf(t)]+&#x27;22&#x27;,
      borderWidth:2,pointRadius:4,tension:0.4,fill:false
    }))},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:&#x27;index&#x27;,intersect:false},
      plugins:{legend:{position:&#x27;top&#x27;}},scales:{x:{grid:G},y:{grid:G,ticks:{callback:v=&gt;v.toLocaleString()}}}}
  });
  // Rate line (Unit/Hrs)
  charts.m6rate=new Chart(document.getElementById(&#x27;m6-rate&#x27;),{
    type:&#x27;line&#x27;,
    data:{labels:D.months,datasets:techs.map((t,i)=&gt;{
      const rates=Object.values(D.m6[t]).map(m=&gt;m.total&gt;0?(m.unit/m.total).toFixed(2):0);
      return{label:t,data:rates,borderColor:D.techColors[D.techs.indexOf(t)],borderWidth:2,pointRadius:4,tension:0.3,fill:false};
    })},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:&#x27;index&#x27;,intersect:false},
      plugins:{legend:{position:&#x27;top&#x27;}},
      scales:{x:{grid:G},y:{grid:G,title:{display:true,text:&#x27;Unit/Hrs&#x27;,color:&#x27;#8896B3&#x27;}}}}
  });
  // YTD summary
  let html=`&lt;thead&gt;&lt;tr&gt;&lt;th&gt;Technician&lt;/th&gt;&lt;th class=&quot;r&quot;&gt;YTD Unit&lt;/th&gt;&lt;th class=&quot;r&quot;&gt;YTD Reg Hrs&lt;/th&gt;&lt;th class=&quot;r&quot;&gt;YTD OT Hrs&lt;/th&gt;&lt;th class=&quot;r&quot;&gt;YTD Total Hrs&lt;/th&gt;&lt;th class=&quot;r&quot;&gt;Unit/Hrs&lt;/th&gt;&lt;th class=&quot;r&quot;&gt;Unit/Day&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;`;
  techs.forEach((t,i)=&gt;{
    const ms=Object.values(D.m6[t]);
    const ytdU=ms.reduce((a,m)=&gt;a+m.unit,0);
    const ytdR=ms.reduce((a,m)=&gt;a+m.reg,0).toFixed(1);
    const ytdO=ms.reduce((a,m)=&gt;a+m.ot,0).toFixed(1);
    const ytdT=ms.reduce((a,m)=&gt;a+m.total,0).toFixed(1);
    const rate=(ytdU/parseFloat(ytdT)).toFixed(2);
    const dayRate=(ytdU/(parseFloat(ytdT)/8)).toFixed(1);
    html+=`&lt;tr&gt;&lt;td&gt;${t}&lt;/td&gt;&lt;td class=&quot;r hl&quot;&gt;${ytdU.toLocaleString()}&lt;/td&gt;&lt;td class=&quot;r&quot;&gt;${ytdR}&lt;/td&gt;&lt;td class=&quot;r&quot;&gt;${ytdO}&lt;/td&gt;&lt;td class=&quot;r&quot;&gt;${ytdT}&lt;/td&gt;&lt;td class=&quot;r&quot; style=&quot;color:#0891B2&quot;&gt;${rate}&lt;/td&gt;&lt;td class=&quot;r&quot; style=&quot;color:#0891B2&quot;&gt;${dayRate}&lt;/td&gt;&lt;/tr&gt;`;
  });
  document.getElementById(&#x27;m6-ytd-tbl&#x27;).innerHTML=html+&#x27;&lt;/tbody&gt;&#x27;;
  // Monthly detail
  let html2=`&lt;thead&gt;&lt;tr&gt;&lt;th&gt;Technician&lt;/th&gt;&lt;th&gt;Month&lt;/th&gt;&lt;th class=&quot;r&quot;&gt;Unit&lt;/th&gt;&lt;th class=&quot;r&quot;&gt;Reg Hrs&lt;/th&gt;&lt;th class=&quot;r&quot;&gt;OT Hrs&lt;/th&gt;&lt;th class=&quot;r&quot;&gt;Total Hrs&lt;/th&gt;&lt;th class=&quot;r&quot;&gt;Unit/Hrs&lt;/th&gt;&lt;th class=&quot;r&quot;&gt;Unit/Day&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;`;
  techs.forEach((t,i)=&gt;{
    const tc=D.techColors[D.techs.indexOf(t)];
    Object.entries(D.m6[t]).forEach(([mn,m],j)=&gt;{
      const mLbl=D.months[parseInt(mn)-1];
      const rate=(m.total&gt;0?(m.unit/m.total).toFixed(2):0);
      const day=(m.total&gt;0?(m.unit/(m.total/8)).toFixed(1):0);
      html2+=`&lt;tr&gt;&lt;td style=&quot;color:${tc};font-size:11px&quot;&gt;${j===0?t:&#x27;&#x27;}&lt;/td&gt;&lt;td style=&quot;font-size:11px;color:#475569&quot;&gt;${mLbl}&lt;/td&gt;&lt;td class=&quot;r&quot;&gt;${m.unit.toLocaleString()}&lt;/td&gt;&lt;td class=&quot;r&quot;&gt;${m.reg.toFixed(1)}&lt;/td&gt;&lt;td class=&quot;r&quot;&gt;${m.ot.toFixed(1)}&lt;/td&gt;&lt;td class=&quot;r&quot;&gt;${m.total.toFixed(1)}&lt;/td&gt;&lt;td class=&quot;r&quot; style=&quot;color:#0891B2;font-weight:600&quot;&gt;${rate}&lt;/td&gt;&lt;td class=&quot;r&quot; style=&quot;color:#0891B2&quot;&gt;${day}&lt;/td&gt;&lt;/tr&gt;`;
    });
    html2+=&#x27;&lt;tr style=&quot;height:4px&quot;&gt;&lt;/tr&gt;&#x27;;
  });
  document.getElementById(&#x27;m6-detail-tbl&#x27;).innerHTML=html2+&#x27;&lt;/tbody&gt;&#x27;;
}

.dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.row-2{display:grid;grid-template-columns:1.3fr 1fr;gap:18px}
.toggle-row{display:flex;gap:8px;margin-bottom:15px;flex-wrap:wrap;align-items:center}
.toggle-group{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.tg-btn{padding:7px 14px;border:none;background:var(--card);cursor:pointer;font-size:12.5px;font-weight:600;color:var(--t2);transition:all .13s;font-family:inherit}
.tg-btn:not(:last-child){border-right:1px solid var(--border)}
.tg-btn.on{background:var(--primary);color:#fff}
.tg-label{font-size:11px;color:var(--t3);font-weight:600;margin-right:2px}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:9px 12px;text-align:right;border-bottom:1px solid var(--border)}
th:first-child,td:first-child{text-align:left}
thead th{background:#F1F5F9;font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.02em}
tbody tr:hover{background:var(--primary-lt)}
.tot-row{font-weight:700;background:#FFF7ED}.tot-row td{border-top:2px solid var(--primary-md)}
.hl-pill{font-size:10px;padding:1px 7px;border-radius:9px;background:#EDE9FE;color:#6D28D9;font-weight:600}
.manual-pill{font-size:10px;padding:1px 7px;border-radius:9px;background:#FEF3C7;color:#B45309;font-weight:600}
.notice{border-left:3px solid #F59E0B;background:#FFFBEB;padding:14px 18px;border-radius:8px;margin-bottom:18px;font-size:12.5px;color:#92400E}
@media(max-width:980px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.row-2{grid-template-columns:1fr}}

/* ===== HAUS unified theme polish (v1.14) ===== */
body{ -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility; }
.tbl{ font-variant-numeric:tabular-nums lining-nums; }
.tbl th{ font-weight:600;letter-spacing:.015em; }
.tbl td.r,.tbl th.r{ font-variant-numeric:tabular-nums; }
.kpi-v{ font-variant-numeric:tabular-nums;letter-spacing:-.015em; }
.card-title{ letter-spacing:-.01em; }
.card{ border-radius:12px; }
.stab-badge,.hub-badge{ font-variant-numeric:tabular-nums; }

.tab-btn.active{background:var(--primary-lt);color:var(--primary);font-weight:700;border-left-color:var(--primary)}
.tb-icon{font-size:15px}.tb-badge{margin-left:auto;font-size:10px;padding:1px 7px;border-radius:9px;background:var(--border);color:var(--t2);font-family:&#x27;JetBrains Mono&#x27;}
.sb-footer{padding:16px 20px;border-top:1px solid var(--border);margin-top:8px;font-size:11px;color:var(--t3)}
.sb-rrow{display:flex;justify-content:space-between;margin-bottom:5px}.sb-rval{font-family:&#x27;JetBrains Mono&#x27;;font-weight:700;color:var(--t2)}
.main{flex:1;margin-left:228px}
.top-bar{background:var(--card);border-bottom:1px solid var(--border);padding:15px 28px;display:flex;align-items:center;gap:11px;position:sticky;top:0;z-index:20}
.tb-title{font-size:17px;font-weight:800}
.tb-tag{font-size:11px;padding:3px 10px;border-radius:6px;background:var(--primary-lt);color:var(--primary);font-weight:600}
.ver-badge{font-size:10px;font-family:&#x27;JetBrains Mono&#x27;;color:var(--t2);padding:2px 7px;border:1px solid var(--border);border-radius:4px;margin-left:8px}
.lang-sel{display:flex;align-items:center;gap:3px;margin-left:8px}
.lang-btn{padding:4px 9px;border:1px solid var(--border);border-radius:5px;background:none;cursor:pointer;font-size:11px;font-weight:700;color:var(--t2);transition:all .15s;font-family:inherit}
.lang-btn:hover{border-color:var(--primary-md);color:var(--primary)}
.lang-btn.lact{background:var(--primary-md);border-color:var(--primary-md);color:#fff}
.lang-sep{font-size:10px;color:var(--t3)}
.tb-meta{margin-left:auto;font-size:12px;color:var(--t3);font-family:&#x27;JetBrains Mono&#x27;}
.content-area{padding:24px 28px;max-width:1300px}
.tab-panel{display:none}.tab-panel.active{display:block}
.sec-label{font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.05em;text-transform:uppercase;margin:22px 0 13px;padding-left:9px;border-left:3px solid var(--primary)}
.sec-label:first-child{margin-top:4px}
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:15px;margin-bottom:8px}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;border-top:3px solid var(--accent,var(--primary))}
.kpi-label{font-size:12px;color:var(--t2);font-weight:600;margin-bottom:7px}
.kpi-value{font-size:26px;font-weight:800;font-family:&#x27;JetBrains Mono&#x27;}
.kpi-value .unit{font-size:14px;color:var(--t3);font-weight:600}
.kpi-sub{font-size:11px;color:var(--t3);margin-top:5px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:18px}
.card-title{font-size:14px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.card-sub{font-size:11.5px;color:var(--t3);margin-bottom:15px}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.row-2{display:grid;grid-template-columns:1.3fr 1fr;gap:18px}
.toggle-row{display:flex;gap:8px;margin-bottom:15px;flex-wrap:wrap;align-items:center}
.toggle-group{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.tg-btn{padding:7px 14px;border:none;background:var(--card);cursor:pointer;font-size:12.5px;font-weight:600;color:var(--t2);transition:all .13s;font-family:inherit}
.tg-btn:not(:last-child){border-right:1px solid var(--border)}
.tg-btn.on{background:var(--primary);color:#fff}
.tg-label{font-size:11px;color:var(--t3);font-weight:600;margin-right:2px}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:9px 12px;text-align:right;border-bottom:1px solid var(--border)}
th:first-child,td:first-child{text-align:left}
thead th{background:#F1F5F9;font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.02em}
tbody tr:hover{background:var(--primary-lt)}
.tot-row{font-weight:700;background:#FBF6F3}.tot-row td{border-top:2px solid var(--primary-md)}
.notice{border-left:3px solid #D97706;background:#FFFBEB;padding:14px 18px;border-radius:8px;margin-bottom:18px;font-size:12.5px;color:#92400E}
@media(max-width:980px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.row-2{grid-template-columns:1fr}}

.sheet-panel { display:none; }
.sheet-panel.active { display:block; animation:fadeUp .25s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.sec-label { display:flex; align-items:center; gap:8px; font-size:10px; font-weight:700; color:var(--t3); letter-spacing:.1em; text-transform:uppercase; margin:24px 0 12px; }
.sec-label::before { content:&#x27;&#x27;; width:3px; height:12px; background:var(--primary-md); border-radius:2px; }
.sec-label::after { content:&#x27;&#x27;; flex:1; height:1px; background:var(--border); }
.sec-label:first-child { margin-top:0; }

/* KPI */
.kpi-row { display:flex; gap:11px; flex-wrap:wrap; margin-bottom:18px; }
.kpi { flex:1; min-width:140px; background:var(--surface); border:1px solid var(--border); border-top:3px solid var(--accent,#3B82F6); border-radius:var(--r); padding:15px 17px; box-shadow:var(--shadow-sm); }
.kpi-lbl { font-size:10px; font-weight:700; color:var(--t3); letter-spacing:.06em; text-transform:uppercase; margin-bottom:6px; }
.kpi-val { font-family:&#x27;JetBrains Mono&#x27;; font-size:22px; font-weight:700; line-height:1; }
.kpi-sub { font-size:10px; color:var(--t2); margin-top:4px; }

/* CARD */
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:20px; box-shadow:var(--shadow-sm); }
.card-title { font-size:13px; font-weight:700; color:var(--t1); margin-bottom:3px; }
.card-sub { font-size:11px; color:var(--t2); margin-bottom:14px; }
.g2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.g3 { display:grid; grid-template-columns:2fr 1fr; gap:14px; }
.g4 { display:grid; grid-template-columns:3fr 2fr; gap:14px; }
.mt16 { margin-top:16px; }

/* TECH LEGEND */
.tleg { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; }
.tleg-item { display:flex; align-items:center; gap:4px; font-size:11px; color:var(--t2); }
.tleg-dot { width:7px; height:7px; border-radius:50%; }

/* TOGGLE */
.tog-grp { display:inline-flex; background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:3px; gap:2px; margin-bottom:12px; }
.tog { padding:6px 14px; border:none; border-radius:4px; cursor:pointer; font-family:&#x27;Inter&#x27;; font-size:11px; font-weight:600; color:var(--t2); background:none; transition:all .15s; }
.tog:hover { color:var(--t1); }
.tog.on { background:var(--primary-md); color:#fff; box-shadow:0 1px 3px rgba(59,130,246,.3); }

/* TABLE */
.tbl { width:100%; border-collapse:collapse; font-size:12px; }
.tbl thead { position:sticky; top:0; z-index:1; }
.tbl th { text-align:left; padding:9px 11px; font-size:10px; font-weight:700; color:var(--t2); letter-spacing:.06em; text-transform:uppercase; border-bottom:2px solid var(--border2); background:var(--bg); white-space:nowrap; }
.tbl td { padding:8px 11px; border-bottom:1px solid var(--border); }
.tbl tbody tr:hover td { background:var(--primary-lt); }
.tbl .r { text-align:right; font-family:&#x27;JetBrains Mono&#x27;; }
.tbl .hl { font-weight:700; color:var(--primary-md); }
.tbl .tot td { background:var(--primary-lt); font-weight:700; }
.rate { display:inline-flex; padding:2px 7px; border-radius:12px; font-size:10px; font-weight:700; font-family:&#x27;JetBrains Mono&#x27;; }
.rate.hi { background:#FEE2E2; color:#DC2626; }
.rate.mid { background:#FEF3C7; color:#D97706; }
.rate.lo { background:#DCFCE7; color:#16A34A; }
.bar-bg { flex:1; height:4px; background:var(--border); border-radius:2px; min-width:40px; }
.bar-fill { height:100%; border-radius:2px; transition:width .6s ease; }
.bar-cell { display:flex; align-items:center; gap:6px; }

/* FUNNEL */
.funnel-row { display:flex; align-items:center; gap:10px; padding:7px 0; border-bottom:1px solid var(--border); }
.funnel-label { font-size:12px; width:78px; color:var(--t2); font-weight:500; }
.funnel-bar-wrap { flex:1; background:var(--border); border-radius:5px; height:22px; overflow:hidden; }
.funnel-bar { height:100%; border-radius:5px; display:flex; align-items:center; padding-left:8px; transition:width .7s cubic-bezier(.4,0,.2,1); font-size:11px; font-weight:700; font-family:&#x27;JetBrains Mono&#x27;; color:#fff; }
.funnel-pct { font-family:&#x27;JetBrains Mono&#x27;; font-size:11px; color:var(--t2); width:36px; text-align:right; }

::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }
@media(max-width:900px) { .g2,.g3,.g4{grid-template-columns:1fr} .kpi-row{flex-wrap:wrap} }

.lang-sel{display:flex;align-items:center;gap:3px;margin-left:10px}
.lang-btn{padding:4px 9px;border:1px solid var(--border);border-radius:5px;background:none;cursor:pointer;font-size:11px;font-weight:700;color:var(--t2);transition:all .15s;font-family:&#x27;Inter&#x27;;}
.lang-btn:hover{border-color:var(--primary-md);color:var(--primary)}
.lang-btn.lact{background:var(--primary-md);border-color:var(--primary-md);color:#fff}
.lang-sep{font-size:10px;color:var(--t3)}
.ver-badge{font-size:10px;font-family:&#x27;JetBrains Mono&#x27;;color:var(--t3);padding:2px 7px;border:1px solid var(--border);border-radius:4px}

/* ===== 3D Printing 시안 테마 오버라이드 ===== */
:root{ --primary:#0E7490; --primary-md:#06B6D4; --primary-lt:#ECFEFF; --primary-xl:#CFFAFE; --bg:#ECFCFF; --bg3:#F2FDFF; --border:#CBEEF3; --gb:#CBEEF3; }
.mill-sb-icon{ background:linear-gradient(135deg,#06B6D4,#0E7490)!important; }
.stab.active{ background:#0891B2!important; }
.tog.on{ background:#0891B2!important; color:#fff!important; }
.tog{ padding:6px 13px;border:1px solid var(--border);border-radius:7px;background:var(--surface);cursor:pointer;font-size:12px;font-weight:600;color:var(--t2);font-family:&#x27;Inter&#x27;;transition:all .15s; }
.tog-grp{ display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px; }
.tbl th{ background:var(--primary-lt);color:var(--primary);font-weight:700;padding:8px 10px;text-align:left;border-bottom:2px solid var(--primary-xl);font-size:11px; }
.tbl td{ padding:7px 10px;border-bottom:1px solid var(--border);color:var(--t1); }
.tbl td.r,.tbl th.r{ text-align:right;font-family:&#x27;JetBrains Mono&#x27;; }
.tbl tr.tot td{ font-weight:700;background:var(--bg3);color:var(--primary); }
.tbl tr.man td{ background:#FFFBEB; }
.note-box{ background:#FFFBEB;border:1px solid #FDE68A;border-radius:8px;padding:11px 14px;font-size:11.5px;color:#92400E;margin-top:12px;line-height:1.5; }
.infg-row{ display:flex;align-items:center;gap:10px;margin-bottom:9px; }
.infg-lbl{ width:120px;font-size:12px;color:var(--t1);font-weight:600; }
.infg-track{ flex:1;height:22px;background:var(--bg);border-radius:6px;overflow:hidden;position:relative; }
.infg-fill{ height:100%;border-radius:6px;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-size:10px;font-weight:700;color:#fff;font-family:&#x27;JetBrains Mono&#x27;; }

/* ===== HAUS unified theme polish (v1.14) ===== */
body{ -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility; }

.card-title{ letter-spacing:-.01em; }
.card{ border-radius:12px; }
.stab-badge,.hub-badge{ font-variant-numeric:tabular-nums; }

// ===== P2 =====
function drawP2(){
  const opts=Object.keys(D.opt);
  let h=&#x27;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;Month&lt;/th&gt;&#x27;+opts.map(o=&gt;`&lt;th class=&quot;r&quot;&gt;${o}&lt;/th&gt;`).join(&#x27;&#x27;)+&#x27;&lt;th class=&quot;r&quot;&gt;Sub-Total&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;&#x27;;
  D.months.forEach((m,i)=&gt;{let st=opts.reduce((a,o)=&gt;a+D.opt[o][i],0);h+=`&lt;tr&gt;&lt;td&gt;${m}&lt;/td&gt;`+opts.map(o=&gt;`&lt;td class=&quot;r&quot;&gt;${D.opt[o][i]||&#x27;—&#x27;}&lt;/td&gt;`).join(&#x27;&#x27;)+`&lt;td class=&quot;r&quot; style=&quot;font-weight:700&quot;&gt;${st}&lt;/td&gt;&lt;/tr&gt;`;});
  let yt=opts.map(o=&gt;D.opt[o].reduce((a,b)=&gt;a+b,0));
  h+=`&lt;tr class=&quot;tot&quot;&gt;&lt;td&gt;YTD&lt;/td&gt;`+yt.map(v=&gt;`&lt;td class=&quot;r&quot;&gt;${v}&lt;/td&gt;`).join(&#x27;&#x27;)+`&lt;td class=&quot;r&quot;&gt;${yt.reduce((a,b)=&gt;a+b,0)}&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;`;
  document.getElementById(&#x27;p2-tbl&#x27;).innerHTML=h;
  const ocol={&#x27;Fuse &amp; Cure&#x27;:&#x27;#06B6D4&#x27;,&#x27;Glaze &amp; Finish&#x27;:&#x27;#0E7490&#x27;,&#x27;Polishing&#x27;:&#x27;#67E8F9&#x27;,&#x27;Model (In-house)&#x27;:&#x27;#D97706&#x27;};
  if(charts.p2)charts.p2.destroy();
  charts.p2=new Chart(document.getElementById(&#x27;p2-bar&#x27;),{type:&#x27;bar&#x27;,data:{labels:D.months,datasets:opts.map(o=&gt;({label:o,data:D.opt[o],backgroundColor:ocol[o]}))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:&#x27;top&#x27;,labels:{font:{size:11}}}},scales:{x:{stacked:false},y:{beginAtZero:true}}}});
}

// ===== P4 =====
function drawP4(){
  const techs=Object.keys(D.p4);
  // Section1
  let h=&#x27;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;Technician&lt;/th&gt;&lt;th class=&quot;r&quot;&gt;Final Item Unit&lt;/th&gt;&lt;th class=&quot;r&quot;&gt;Reg Hrs&lt;/th&gt;&lt;th class=&quot;r&quot;&gt;OT Hrs&lt;/th&gt;&lt;th class=&quot;r&quot;&gt;Total Hrs&lt;/th&gt;&lt;th class=&quot;r&quot;&gt;Unit/Hour&lt;/th&gt;&lt;th class=&quot;r&quot;&gt;Unit/Day&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;&#x27;;
  let sF=0,sR=0,sO=0;
  techs.forEach(tc=&gt;{const d=D.p4[tc];const th=d.reg+d.ot;sF+=d.fiu;sR+=d.reg;sO+=d.ot;h+=`&lt;tr&gt;&lt;td&gt;${tc}&lt;/td&gt;&lt;td class=&quot;r&quot;&gt;${fmt(d.fiu)}&lt;/td&gt;&lt;td class=&quot;r&quot;&gt;${d.reg.toFixed(1)}&lt;/td&gt;&lt;td class=&quot;r&quot;&gt;${d.ot.toFixed(1)}&lt;/td&gt;&lt;td class=&quot;r&quot;&gt;${th.toFixed(1)}&lt;/td&gt;&lt;td class=&quot;r&quot; style=&quot;font-weight:700;color:#0891B2&quot;&gt;${(d.fiu/th).toFixed(2)}&lt;/td&gt;&lt;td class=&quot;r&quot; style=&quot;font-weight:700;color:#0891B2&quot;&gt;${(d.fiu/(th/8)).toFixed(1)}&lt;/td&gt;&lt;/tr&gt;`;});
  const sT=sR+sO;
  h+=`&lt;tr class=&quot;tot&quot;&gt;&lt;td&gt;합계/평균&lt;/td&gt;&lt;td class=&quot;r&quot;&gt;${fmt(sF)}&lt;/td&gt;&lt;td class=&quot;r&quot;&gt;${sR.toFixed(1)}&lt;/td&gt;&lt;td class=&quot;r&quot;&gt;${sO.toFixed(1)}&lt;/td&gt;&lt;td class=&quot;r&quot;&gt;${sT.toFixed(1)}&lt;/td&gt;&lt;td class=&quot;r&quot;&gt;${(sF/sT).toFixed(2)}&lt;/td&gt;&lt;td class=&quot;r&quot;&gt;${(sF/(sT/8)).toFixed(1)}&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;`;
  document.getElementById(&#x27;p4-s1tbl&#x27;).innerHTML=h;
  // Section2 per-tech monthly (Cum hidden)
  let tablesHtml=&#x27;&#x27;;
  techs.forEach(tc=&gt;{const d=D.p4[tc];let cq=0,ch=0;
    let tb=`&lt;div class=&quot;card&quot; style=&quot;box-shadow:none;border:1px solid var(--border)&quot;&gt;&lt;div class=&quot;card-title&quot; style=&quot;font-size:12px&quot;&gt;▶ ${tc}&lt;/div&gt;&lt;table class=&quot;tbl mt16&quot;&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;Month&lt;/th&gt;&lt;th class=&quot;r&quot;&gt;Final Item Unit&lt;/th&gt;&lt;th class=&quot;r&quot;&gt;Hours&lt;/th&gt;&lt;th class=&quot;r&quot;&gt;Unit/Hour&lt;/th&gt;&lt;th class=&quot;r&quot;&gt;Unit/Day&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;`;
    D.months.forEach((m,i)=&gt;{cq+=d.mUnit[i];ch+=d.mHrs[i];const uh=ch&gt;0?(cq/ch):0;const ud=ch&gt;0?(cq/(ch/8)):0;tb+=`&lt;tr&gt;&lt;td&gt;${m}&lt;/td&gt;&lt;td class=&quot;r&quot;&gt;${d.mUnit[i]||&#x27;—&#x27;}&lt;/td&gt;&lt;td class=&quot;r&quot;&gt;${d.mHrs[i]?d.mHrs[i].toFixed(1):&#x27;—&#x27;}&lt;/td&gt;&lt;td class=&quot;r&quot; style=&quot;color:#0891B2;font-weight:600&quot;&gt;${uh?uh.toFixed(2):&#x27;—&#x27;}&lt;/td&gt;&lt;td class=&quot;r&quot; style=&quot;color:#0891B2;font-weight:600&quot;&gt;${ud?ud.toFixed(1):&#x27;—&#x27;}&lt;/td&gt;&lt;/tr&gt;`;});
    tb+=&#x27;&lt;/tbody&gt;&lt;/table&gt;&lt;/div&gt;&#x27;;tablesHtml+=tb;});
  document.getElementById(&#x27;p4-tables&#x27;).innerHTML=tablesHtml;
  // line chart: cumulative Unit/Hour
  if(charts.p4)charts.p4.destroy();
  const ds=techs.map((tc,ti)=&gt;{const d=D.p4[tc];let cq=0,ch=0;const pts=D.months.map((m,i)=&gt;{cq+=d.mUnit[i];ch+=d.mHrs[i];return ch&gt;0?+(cq/ch).toFixed(2):null;});return {label:tc,data:pts,borderColor:[&#x27;#0891B2&#x27;,&#x27;#8B5CF6&#x27;][ti],backgroundColor:&#x27;transparent&#x27;,borderWidth:2.5,pointRadius:4,tension:.3,spanGaps:true};});
  charts.p4=new Chart(document.getElementById(&#x27;p4-line&#x27;),{type:&#x27;line&#x27;,data:{labels:D.months,datasets:ds},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:&#x27;top&#x27;}},scales:{y:{beginAtZero:true,title:{display:true,text:&#x27;Unit/Hour&#x27;}}}}});
}

function renderAll(){drawP0();drawP1();drawP2();drawP4();}

@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.sec-label { display:flex; align-items:center; gap:8px; font-size:10px; font-weight:700; color:var(--t3); letter-spacing:.1em; text-transform:uppercase; margin:24px 0 12px; }
.sec-label::before { content:&#x27;&#x27;; width:3px; height:12px; background:var(--primary-md); border-radius:2px; }
.sec-label::after { content:&#x27;&#x27;; flex:1; height:1px; background:var(--border); }
.sec-label:first-child { margin-top:0; }

/* KPI */
.kpi-row { display:flex; gap:11px; flex-wrap:wrap; margin-bottom:18px; }
.kpi { flex:1; min-width:140px; background:var(--surface); border:1px solid var(--border); border-top:3px solid var(--accent,#3B82F6); border-radius:var(--r); padding:15px 17px; box-shadow:var(--shadow-sm); }
.kpi-lbl { font-size:10px; font-weight:700; color:var(--t3); letter-spacing:.06em; text-transform:uppercase; margin-bottom:6px; }
.kpi-val { font-family:&#x27;JetBrains Mono&#x27;; font-size:22px; font-weight:700; line-height:1; }
.kpi-sub { font-size:10px; color:var(--t2); margin-top:4px; }

/* CARD */
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:20px; box-shadow:var(--shadow-sm); }
.card-title { font-size:13px; font-weight:700; color:var(--t1); margin-bottom:3px; }
.card-sub { font-size:11px; color:var(--t2); margin-bottom:14px; }
.g2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.g3 { display:grid; grid-template-columns:2fr 1fr; gap:14px; }
.g4 { display:grid; grid-template-columns:3fr 2fr; gap:14px; }
.mt16 { margin-top:16px; }

/* TECH LEGEND */
.tleg { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; }
.tleg-item { display:flex; align-items:center; gap:4px; font-size:11px; color:var(--t2); }
.tleg-dot { width:7px; height:7px; border-radius:50%; }

/* TOGGLE */
.tog-grp { display:inline-flex; background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:3px; gap:2px; margin-bottom:12px; }
.tog { padding:6px 14px; border:none; border-radius:4px; cursor:pointer; font-family:&#x27;Inter&#x27;; font-size:11px; font-weight:600; color:var(--t2); background:none; transition:all .15s; }
.tog:hover { color:var(--t1); }
.tog.on { background:var(--primary-md); color:#fff; box-shadow:0 1px 3px rgba(59,130,246,.3); }

/* TABLE */
.tbl { width:100%; border-collapse:collapse; font-size:12px; }
.tbl thead { position:sticky; top:0; z-index:1; }
.tbl th { text-align:left; padding:9px 11px; font-size:10px; font-weight:700; color:var(--t2); letter-spacing:.06em; text-transform:uppercase; border-bottom:2px solid var(--border2); background:var(--bg); white-space:nowrap; }
.tbl td { padding:8px 11px; border-bottom:1px solid var(--border); }
.tbl tbody tr:hover td { background:var(--primary-lt); }
.tbl .r { text-align:right; font-family:&#x27;JetBrains Mono&#x27;; }
.tbl .hl { font-weight:700; color:var(--primary-md); }
.tbl .tot td { background:var(--primary-lt); font-weight:700; }
.rate { display:inline-flex; padding:2px 7px; border-radius:12px; font-size:10px; font-weight:700; font-family:&#x27;JetBrains Mono&#x27;; }
.rate.hi { background:#FEE2E2; color:#DC2626; }
.rate.mid { background:#FEF3C7; color:#D97706; }
.rate.lo { background:#DCFCE7; color:#16A34A; }
.bar-bg { flex:1; height:4px; background:var(--border); border-radius:2px; min-width:40px; }
.bar-fill { height:100%; border-radius:2px; transition:width .6s ease; }
.bar-cell { display:flex; align-items:center; gap:6px; }

/* FUNNEL */
.funnel-row { display:flex; align-items:center; gap:10px; padding:7px 0; border-bottom:1px solid var(--border); }
.funnel-label { font-size:12px; width:78px; color:var(--t2); font-weight:500; }
.funnel-bar-wrap { flex:1; background:var(--border); border-radius:5px; height:22px; overflow:hidden; }
.funnel-bar { height:100%; border-radius:5px; display:flex; align-items:center; padding-left:8px; transition:width .7s cubic-bezier(.4,0,.2,1); font-size:11px; font-weight:700; font-family:&#x27;JetBrains Mono&#x27;; color:#fff; }
.funnel-pct { font-family:&#x27;JetBrains Mono&#x27;; font-size:11px; color:var(--t2); width:36px; text-align:right; }

::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }
@media(max-width:900px) { .g2,.g3,.g4{grid-template-columns:1fr} .kpi-row{flex-wrap:wrap} }

.lang-sel{display:flex;align-items:center;gap:3px;margin-left:10px}
.lang-btn{padding:4px 9px;border:1px solid var(--border);border-radius:5px;background:none;cursor:pointer;font-size:11px;font-weight:700;color:var(--t2);transition:all .15s;font-family:&#x27;Inter&#x27;;}
.lang-btn:hover{border-color:var(--primary-md);color:var(--primary)}
.lang-btn.lact{background:var(--primary-md);border-color:var(--primary-md);color:#fff}
.lang-sep{font-size:10px;color:var(--t3)}
.ver-badge{font-size:10px;font-family:&#x27;JetBrains Mono&#x27;;color:var(--t3);padding:2px 7px;border:1px solid var(--border);border-radius:4px}
.kpi-l { font-size:10px; font-weight:700; color:var(--t3); letter-spacing:.06em; text-transform:uppercase; margin-bottom:6px; }
.kpi-s { font-size:10px; color:var(--t2); margin-top:4px; }

.seg{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.segbtn{padding:7px 16px;border:1px solid var(--border);background:var(--surface);border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;color:var(--t2)}
.segbtn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.mbtn{padding:6px 12px;border:1px solid var(--border);background:var(--surface);border-radius:7px;font-weight:600;font-size:12px;cursor:pointer;color:var(--t2);margin-left:4px}
.mbtn.active{background:var(--primary-md);color:#fff;border-color:var(--primary-md)}
.infg-row{display:flex;align-items:center;gap:10px;margin:7px 0;font-size:13px}
.infg-bar{height:18px;border-radius:4px;background:var(--primary-md)}
.pct{display:inline-block;font-size:11px;color:var(--t2);background:var(--primary-lt);padding:1px 8px;border-radius:10px;margin-left:7px;font-weight:600;font-variant-numeric:tabular-nums}

/* ===== HAUS unified theme polish (v1.14) ===== */
body{ -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility; }
.tbl{ font-variant-numeric:tabular-nums lining-nums; }
.tbl th{ font-weight:600;letter-spacing:.015em; }
.tbl td.r,.tbl th.r{ font-variant-numeric:tabular-nums; }
.kpi-v{ font-variant-numeric:tabular-nums;letter-spacing:-.015em; }
.card-title{ letter-spacing:-.01em; }
.card{ border-radius:12px; }
.stab-badge,.hub-badge{ font-variant-numeric:tabular-nums; }
